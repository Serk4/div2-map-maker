<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DIV2 Map Maker – Washington DC</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- ── Header ── -->
    <header id="app-header">
      <span id="header-title">DIV2 MAP MAKER</span>
      <button id="toggle-panel" aria-label="Toggle panel" title="Toggle Panel">&#9776;</button>
    </header>

    <!-- ── Map ── -->
    <div id="map"></div>

    <!-- ── Side / Bottom Panel ── -->
    <aside id="side-panel" aria-label="Map control panel">
      <div class="panel-content">

        <!-- Map name -->
        <section class="panel-section">
          <label for="map-name">Map Name</label>
          <input type="text" id="map-name" placeholder="Enter map name…" maxlength="60" autocomplete="off" />
        </section>

        <!-- Pin counter -->
        <section class="panel-section pin-counter">
          <span id="pin-count">0</span><span class="counter-sep"> / 100</span>
          <span class="counter-label">pins placed</span>
        </section>

        <!-- Category picker -->
        <section class="panel-section">
          <div class="section-heading">Pin Category</div>
          <div class="category-grid" id="category-grid"></div>
        </section>

        <!-- Action buttons -->
        <section class="panel-section">
          <div class="section-heading">Actions</div>
          <div class="action-grid">
            <button id="btn-save"  class="action-btn">&#128190; Save</button>
            <button id="btn-load"  class="action-btn">&#128194; Load</button>
            <button id="btn-share" class="action-btn">&#128279; Share</button>
            <button id="btn-clear" class="action-btn danger">&#128465; Clear All</button>
          </div>
        </section>

        <!-- Pin list -->
        <section class="panel-section">
          <div class="section-heading">Pin List</div>
          <div id="pin-list">
            <p class="empty-hint">Tap the map to add pins.</p>
          </div>
        </section>

      </div>
    </aside>

  </div><!-- #app -->

  <!-- ── Add-Pin Modal ── -->
  <div id="pin-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Add pin">
    <div class="modal-box">
      <h2 class="modal-title">Add Pin</h2>
      <label for="pin-label" class="modal-label">Label <span class="optional">(optional, max 50 chars)</span></label>
      <input type="text" id="pin-label" placeholder="e.g. Named Drop, Boss Spawn…" maxlength="50" autocomplete="off" />
      <div class="modal-coords" id="modal-coords"></div>
      <div class="modal-actions">
        <button id="btn-confirm-pin" class="btn-primary">Add Pin</button>
        <button id="btn-cancel-pin"  class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Share Modal ── -->
  <div id="share-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Share map">
    <div class="modal-box">
      <h2 class="modal-title">Share Map</h2>
      <p class="modal-desc">Copy and send this link. Anyone who opens it will see your pins.</p>
      <input type="text" id="share-url" readonly aria-label="Share URL" />
      <div class="modal-actions">
        <button id="btn-copy-url"    class="btn-primary">Copy Link</button>
        <button id="btn-close-share" class="btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for loading -->
  <input type="file" id="file-input" accept=".json,.txt" style="display:none" aria-hidden="true" />

  <!-- Toast notification -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
